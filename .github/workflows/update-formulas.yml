name: Bump formulas

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run bump script
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/bump.sh

      - name: Open PR if changes
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/bump-formulas
          title: "chore: bump formulas to latest upstream releases"
          commit-message: "chore: bump formulas to latest upstream releases"
          body: "Automated bump from `scripts/bump.sh`."
          delete-branch: true
