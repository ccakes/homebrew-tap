name: Audit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Tap local checkout
        run: brew tap ccakes/tap "$GITHUB_WORKSPACE" --force
      - name: Audit formula
        run: brew audit --strict ccakes/tap/workbench
      - name: Audit cask
        run: brew audit --strict --cask ccakes/tap/elo
